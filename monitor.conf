# ==========================================
# TIMING & SCHEDULING
# ==========================================
# Seconds between standard ping tests
CHECK_INTERVAL=15

# How many loops to wait before running the heavy curl bandwidth test 
# (e.g., 15s interval * 20 loops = 300 seconds / 5 minutes)
HEAVY_CHECK_MULTIPLIER=20

# ==========================================
# QUALITY THRESHOLDS
# ==========================================
# Maximum allowed average ping in milliseconds
MAX_LATENCY=150

# Minimum allowed download speed in Bytes per second (1,000,000 B/s = ~1 MB/s)
MIN_DL_SPEED=1000000 

# Minimum allowed upload speed in Bytes per second (500,000 B/s = ~0.5 MB/s)
MIN_UL_SPEED=500000

# ==========================================
# REDUNDANT ENDPOINTS
# ==========================================
# IPs to test for basic connectivity (Use reliable DNS providers)
PING_TARGETS=("1.1.1.1" "8.8.8.8" "9.9.9.9")

# Fast, reliable files to download for the heavy test
DL_TARGETS=("http://speedtest.tele2.net/1MB.zip" "https://proof.ovh.net/files/1Mb.dat")

# Endpoints that safely accept and discard temporary POST uploads
UL_TARGETS=("https://httpbin.org/post" "https://ptsv2.com/t/netmon/post")