name: PingShift CI

on: [push, pull_request]

jobs:
  # 1. The Ubuntu Matrix (Native Runners)
  test-ubuntu:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y network-manager curl iputils-ping gawk libnotify-bin
      - name: Run Unit Test Suite
        run: chmod +x test_run.sh && ./test_run.sh
      - name: Test Installation Script
        run: |
          chmod +x install.sh
          sed -i 's/systemctl/echo "CI Environment: Skipping systemctl"/g' install.sh
          ./install.sh

  # 2. The Debian Test (Containerized)
  test-debian:
    name: Test on Debian Bookworm
    runs-on: ubuntu-latest
    container: debian:bookworm-slim # This pulls the official Debian Docker image
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Dependencies (Debian Root)
        # Containers run as root by default, so 'sudo' is not needed here
        run: apt-get update && apt-get install -y network-manager curl iputils-ping gawk libnotify-bin
      
      - name: Run Unit Test Suite
        run: chmod +x test_run.sh && ./test_run.sh
      
      - name: Test Installation Script
        run: |
          chmod +x install.sh
          sed -i 's/systemctl/echo "CI Environment: Skipping systemctl"/g' install.sh
          ./install.sh